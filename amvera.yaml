# Amvera Cloud — Next.js (Node.js Server)
# https://docs.amvera.ru/applications/environments/nodejs-server.html
#
# Важно: на Amvera часто ставят только production-зависимости (без devDependencies).
# Tailwind, PostCSS, TypeScript и @types* должны быть в package.json → dependencies,
# иначе сборка падает с: Cannot find module 'tailwindcss'.

meta:
  environment: node
  toolchain:
    name: npm
    version: 20

# Сначала генерируем lib/products.generated.ts из data/products.xlsx (или .csv), иначе на сайте старый каталог
build:
  additionalCommands: npm run products && npm run build

# containerPort должен совпадать с портом процесса (см. PORT в package.json → start)
run:
  command: npm run start
  containerPort: 3000
